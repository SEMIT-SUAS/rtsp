<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Cameras</title>
  <link rel="stylesheet" href="/pac/css/style.css">
</head>
<body class="dashboard-body">
  <header class="topbar">
    <div>
      <h1>Dashboard de Cameras</h1>
      <p>Monitoramento HLS em tempo real</p>
    </div>
    <a class="logout-btn" href="/pac/logout">Sair</a>
  </header>

  <main class="dashboard-container">
    <section class="category-section">
      <h2>Obra: Maternidade Municipal</h2>
      <div class="camera-grid" id="cat-Interna"></div>
    </section>

    <section class="category-section">
      <h2>Obra: Policlinica</h2>
      <div class="camera-grid" id="cat-Externa"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    async function loadCameras() {
      try {
        const response = await fetch("/pac/api/cameras");
        if (!response.ok) {
          throw new Error("Falha ao carregar lista de cameras");
        }

        const cameras = await response.json();

        cameras.forEach(cam => {
          const target = document.getElementById(`cat-${cam.category}`);
          if (!target) return;

          const card = document.createElement("div");
          card.className = "camera-card";

          card.innerHTML = `
            <div class="camera-header">
              <h3>${cam.name}</h3>
              <span>${cam.id}</span>
            </div>
            <video id="video-${cam.id}" controls autoplay muted playsinline></video>
          `;

          target.appendChild(card);

          const video = document.getElementById(`video-${cam.id}`);
          initHls(video, cam.hls);
        });
      } catch (error) {
        console.error(error);
      }
    }

    function initHls(video, src) {
      if (Hls.isSupported()) {
        const hls = new Hls({
          liveSyncDurationCount: 1,
          maxLiveSyncPlaybackRate: 1.5,
          manifestLoadingMaxRetry: 20,
          manifestLoadingRetryDelay: 1000,
          manifestLoadingMaxRetryTimeout: 8000,
          levelLoadingMaxRetry: 20,
          levelLoadingRetryDelay: 1000,
          fragLoadingMaxRetry: 10,
          fragLoadingRetryDelay: 1000
        });

        hls.loadSource(src);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(err => console.warn("Autoplay bloqueado:", err));
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
          console.error("Erro HLS:", data);
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = src;
        video.addEventListener("loadedmetadata", () => {
          video.play().catch(err => console.warn("Autoplay bloqueado:", err));
        });
      } else {
        console.error("HLS nao suportado neste navegador.");
      }
    }

    loadCameras();
  </script>
</body>
</html>
